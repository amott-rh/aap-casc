---
# AI-generated — review before merging
# Docs: https://github.com/redhat-cop/aap_configuration/tree/devel/roles/credentials
# All secrets must be vaulted — never commit plaintext passwords or keys.

controller_credentials:
  # --- Machine credential (SSH key for managed hosts) ---
  - name: "Linux Machine Credential"
    organization: "<your-org-name>"
    credential_type: "Machine"
    inputs:
      username: "{{ vault_machine_username }}"
      ssh_key_data: "{{ vault_machine_ssh_key }}"
      # become_method: sudo
      # become_username: root

  # --- SCM credential (GitHub/GitLab PAT or SSH key) ---
  - name: "SCM Credential"
    organization: "<your-org-name>"
    credential_type: "Source Control"
    inputs:
      username: "{{ vault_scm_username }}"
      password: "{{ vault_scm_token }}"
      # OR for SSH key:
      # ssh_key_data: "{{ vault_scm_ssh_key }}"

  # --- Azure Service Principal ---
  - name: "Azure Service Principal"
    organization: "<your-org-name>"
    credential_type: "Microsoft Azure Resource Manager"
    inputs:
      subscription: "{{ vault_azure_subscription_id }}"
      client: "{{ vault_azure_client_id }}"
      secret: "{{ vault_azure_client_secret }}"
      tenant: "{{ vault_azure_tenant_id }}"

  # --- HashiCorp Vault (optional — if using external secrets) ---
  # - name: "HashiCorp Vault"
  #   organization: "<your-org-name>"
  #   credential_type: "HashiCorp Vault Secret Lookup"
  #   inputs:
  #     url: "https://vault.example.com"
  #     token: "{{ vault_hashi_token }}"
